:root{--bg:#f0f2f5;--card:#ffffff;--header:#0f2040;--header2:#1a3a6b;--accent:#f0a500;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--blue:#2563eb;--purple:#7c3aed;--teal:#0891b2;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* ── TOPNAV ── */
.topnav{position:sticky;top:0;z-index:100;background:#0f2040;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:44px;gap:12px;}

.tn-tab{color:rgba(255,255,255,.6);font-size:11px;font-weight:600;padding:5px 14px;border-radius:6px;text-decoration:none;white-space:nowrap;transition:all .15s;cursor:pointer;background:transparent;border:none;}
.tn-tab:hover{background:rgba(255,255,255,.12);color:#fff;}
.tn-tab.active{background:#f0a500;color:#0f2040;}
.pdf-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.pdf-btn:hover{background:#f0a500;color:#0f2040;border-color:#f0a500;}

/* ── TABS ── */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── WRAP ── */
.wrap{max-width:1440px;margin:0 auto;padding:16px;}

/* ── GEO ALERT ── */
.geo-alert{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fff;padding:14px 24px;border-radius:10px;margin-bottom:16px;display:flex;align-items:flex-start;gap:16px;}
.geo-alert-icon{font-size:28px;flex-shrink:0;margin-top:2px;}
.geo-alert-body h2{font-size:15px;font-weight:800;margin-bottom:4px;}
.geo-alert-body p{font-size:12px;color:rgba(255,255,255,.85);line-height:1.5;}
.geo-alert-stats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.geo-stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 12px;text-align:center;}
.geo-stat-val{font-size:15px;font-weight:800;color:#fca5a5;}
.geo-stat-lbl{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px;}

/* ── HEADER ── */
.dash-header{background:linear-gradient(135deg,var(--header),var(--header2));color:#fff;padding:20px 28px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
.dash-title h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.dash-title p{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;}
.header-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.meta-tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);}
.meta-tag.alert{background:rgba(220,38,38,.4);border-color:rgba(220,38,38,.6);}

/* ── INTRO CARD ── */
.intro-card{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid #bfdbfe;border-radius:12px;padding:18px 22px;margin-bottom:16px;}
.intro-card h3{font-size:14px;font-weight:700;color:#1e3a5f;margin-bottom:10px;}
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px;}
.intro-block h4{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.intro-block p{font-size:12px;color:var(--text);line-height:1.6;}
.intro-disclaimer{background:#fef9c3;border:1px solid #f59e0b;border-radius:6px;padding:8px 12px;font-size:11px;color:#78350f;line-height:1.5;}

/* ── PERFORMANCE COMPARISON ── */
.perf-card{background:var(--card);border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid var(--blue);margin-bottom:16px;}
.perf-card h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;}
.perf-first-run{font-size:12px;color:var(--muted);font-style:italic;padding:12px 0;}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:var(--card);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid transparent;}

.kpi-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kpi-val{font-size:24px;font-weight:700;line-height:1;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;}
.kpi-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-top:4px;}
.kpi-delta{font-size:11px;font-weight:600;margin-top:4px;}
.delta-up{color:var(--red);}.delta-dn{color:var(--green);}.delta-neu{color:var(--muted);}

/* ── SECTION TITLES ── */
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:20px 0 10px;display:flex;align-items:center;gap:8px;scroll-margin-top:52px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.section-title.danger{color:var(--red);}.section-title.danger::after{background:#fecaca;}

/* ── CHART / CARD LAYOUT ── */
.chart-row{display:grid;gap:14px;margin-bottom:14px;}
.chart-row.cols-1{grid-template-columns:1fr;}.chart-row.cols-2{grid-template-columns:1fr 1fr;}.chart-row.cols-21{grid-template-columns:2fr 1fr;}.chart-row.cols-12{grid-template-columns:1fr 2fr;}
.card{background:var(--card);border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card.danger{border:1px solid #fecaca;background:#fff8f8;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.card-subtitle{font-size:11px;color:var(--muted);font-weight:400;}
.canvas-wrap{position:relative;height:260px;}.canvas-wrap.tall{height:320px;}.canvas-wrap.short{height:200px;}
.insight{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid #bfdbfe;border-radius:10px;padding:16px 20px;margin-bottom:14px;}
.insight h3{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:8px;}
.insight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.ins-item{text-align:center;}.ins-val{font-size:20px;font-weight:700;}.ins-lbl{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:12px;}
table.dt thead th{padding:9px 12px;text-align:left;background:#f8fafc;border-bottom:2px solid var(--border);font-weight:600;color:var(--muted);white-space:nowrap;}

table.dt tbody tr:hover{background:#fafbfc;}

.com-bar-wrap{flex:1;background:#f1f5f9;border-radius:4px;height:20px;overflow:hidden;}
.com-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;}
.com-price{width:90px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0;}
.com-change{width:60px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0;}

/* ── VULN BARS ── */
.vuln-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.vuln-label{width:180px;font-size:12px;font-weight:600;flex-shrink:0;}
.vuln-bar-wrap{flex:1;background:#f1f5f9;border-radius:4px;height:20px;overflow:hidden;}
.vuln-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;}
.vuln-pct{width:50px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0;}

/* ── WINNER / LOSER ── */
.winner-loser-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.wl-col{border-radius:8px;padding:14px 16px;}
.wl-col.winners{background:#f0fdf4;border:1px solid #bbf7d0;}.wl-col.losers{background:#fff1f2;border:1px solid #fecaca;}
.wl-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.wl-title.w{color:var(--green);}.wl-title.l{color:var(--red);}
.wl-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12px;}

/* ── SCENARIO ── */
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.scenario-card{border-radius:8px;padding:14px 16px;}
.scenario-card.resolve{background:#f0fdf4;border:1px solid #bbf7d0;}
.scenario-card.extend{background:#fff1f2;border:1px solid #fecaca;}
.scenario-title{font-size:12px;font-weight:700;margin-bottom:10px;}
.scenario-row{font-size:12px;color:var(--text);margin-bottom:6px;display:flex;gap:8px;}
.scenario-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;width:80px;flex-shrink:0;padding-top:1px;}

/* ── PE ZONE ── */
.pe-zone-bar{height:18px;border-radius:9px;background:linear-gradient(to right,#16a34a 0%,#16a34a 14%,#4ade80 14%,#4ade80 28%,#84cc16 28%,#84cc16 42%,#facc15 42%,#facc15 56%,#f97316 56%,#f97316 70%,#ef4444 70%,#ef4444 84%,#991b1b 84%,#991b1b 100%);position:relative;margin:10px 0 6px;}
.pe-marker{position:absolute;top:-5px;width:4px;height:28px;background:#1e293b;border-radius:2px;transform:translateX(-50%);}
.pe-marker::after{content:attr(data-val);position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#1e293b;white-space:nowrap;}
.pe-zone-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);}

/* ── SECTOR CARDS ── */
.sector-card{background:var(--card);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:3px solid var(--blue);}
.sector-card.high{border-top-color:var(--green);}.sector-card.medium{border-top-color:var(--accent);}
.sc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.sc-name{font-size:14px;font-weight:700;color:var(--text);}
.sc-row{font-size:12px;color:var(--muted);margin-bottom:5px;line-height:1.5;}.sc-row strong{color:var(--text);}
.sc-risk{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:7px 10px;font-size:11px;color:#b91c1c;margin-top:8px;}
.sc-geo{background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:7px 10px;font-size:11px;color:#c2410c;margin-top:6px;}

/* ── STOCKS SUB-TABLE ── */
.stocks-section{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
.stocks-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);margin-bottom:8px;}
.stocks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stock-item{background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:8px 10px;}
.stock-ticker{font-size:11px;font-weight:700;color:var(--blue);}
.stock-name{font-size:10px;color:var(--muted);margin-top:1px;}
.stock-cmp{font-size:13px;font-weight:700;color:var(--text);margin-top:3px;}
.stock-rationale{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;}

/* ── CAPEX ── */
.capex-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.capex-label{width:160px;font-size:12px;font-weight:600;flex-shrink:0;}
.capex-bar-wrap{flex:1;background:#f1f5f9;border-radius:4px;height:22px;overflow:hidden;}
.capex-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;}
.capex-amt{width:90px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0;}
.capex-change{width:55px;font-size:11px;font-weight:700;text-align:right;flex-shrink:0;color:var(--green);}

/* ── FUNDS ── */
.fund-group{margin-bottom:20px;}
.fund-group-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);padding:6px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;display:inline-block;margin-bottom:10px;}
.alloc-guide{background:linear-gradient(135deg,#f0fdf4,#eff6ff);border:1px solid #bbf7d0;border-radius:10px;padding:16px 20px;margin-bottom:14px;}
.alloc-guide h3{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:12px;}
.alloc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.alloc-item{background:#fff;border-radius:8px;padding:12px;text-align:center;border:1px solid #e0e7ff;}
.alloc-pct{font-size:22px;font-weight:800;color:var(--blue);}
.alloc-sector{font-size:11px;font-weight:600;color:var(--text);margin-top:3px;}
.alloc-amt{font-size:10px;color:var(--muted);margin-top:2px;}
.alloc-fund{font-size:10px;color:var(--blue);margin-top:4px;font-style:italic;}

/* ── HEADCOUNT ── */
.hc-card{background:var(--card);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.hc-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.hc-company{font-size:13px;font-weight:700;}
.hc-row{display:grid;grid-template-columns:90px 1fr;gap:4px;margin-bottom:5px;font-size:12px;}
.hc-key{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:10px;padding-top:1px;}
.hc-extra{margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.hc-extra-item{background:#f8fafc;border-radius:6px;padding:6px 8px;border:1px solid var(--border);}
.hc-extra-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.04em;}
.hc-extra-val{font-size:11px;font-weight:600;color:var(--text);margin-top:2px;}

/* ── EXEC SUMMARY ── */
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.exec-item{background:#f8fafc;border-radius:8px;padding:14px 16px;border-left:3px solid var(--blue);}
.exec-item.avoid{border-left-color:var(--red);background:#fef2f2;}
.exec-item.watch{border-left-color:var(--accent);background:#fffbeb;}
.exec-item.geo{border-left-color:#dc2626;background:#fff1f2;}
.exec-item.green{border-left-color:var(--green);background:#f0fdf4;}
.exec-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
.exec-val{font-size:13px;color:var(--text);line-height:1.5;}
.exec-link{color:var(--blue);text-decoration:none;border-bottom:1px dashed var(--blue);cursor:pointer;font-size:12px;}
.exec-link:hover{opacity:.75;}

/* ── Q&A ── */
.qa-section{margin-top:20px;}
details.qa-item{background:var(--card);border-radius:8px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--border);}
details.qa-item[open]{border-color:#bfdbfe;}
summary.qa-q{padding:14px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;}
summary.qa-q::-webkit-details-marker{display:none;}
summary.qa-q::after{content:'＋';font-size:16px;color:var(--blue);}
details.qa-item[open] summary.qa-q::after{content:'－';}
.qa-a{padding:0 16px 14px;font-size:12px;color:var(--text);line-height:1.7;border-top:1px solid #f1f5f9;padding-top:12px;}

/* ── PDF DOWNLOAD SECTION ── */
.pdf-section{text-align:center;padding:30px 20px;background:linear-gradient(135deg,#eff6ff,#f0fdf4);border-radius:12px;border:1px solid #bfdbfe;}
.pdf-section h3{font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:8px;}
.pdf-section p{font-size:12px;color:var(--muted);margin-bottom:18px;}
.pdf-download-btn{background:#0f2040;color:#f0a500;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.pdf-download-btn:hover{background:#1a3a6b;}
.pdf-pin-note{font-size:11px;color:var(--muted);margin-top:10px;}

/* ── VALUATION BADGE ── */
.val-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
.val-cheap-hist{background:#dcfce7;color:#15803d;}
.val-cheap-2024{background:#d1fae5;color:#065f46;}
.val-fair{background:#dbeafe;color:#1d4ed8;}
.val-expensive{background:#fee2e2;color:#b91c1c;}

/* ── PERFORMANCE TABLE ── */
.perf-gain{color:var(--green);font-weight:700;}
.perf-loss{color:var(--red);font-weight:700;}
.perf-neutral{color:var(--muted);font-weight:700;}

/* ── FOOTER ── */
footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);margin-top:10px;border-top:1px solid var(--border);}

/* ── RESPONSIVE — TABLET ── */
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){
  .chart-row.cols-2,.chart-row.cols-21,.chart-row.cols-12{grid-template-columns:1fr;}
  .insight-grid,.exec-grid,.winner-loser-grid,.scenario-grid{grid-template-columns:1fr 1fr;}
  .stocks-grid{grid-template-columns:1fr 1fr;}
  .intro-grid{grid-template-columns:1fr;}
  .hc-extra{grid-template-columns:1fr 1fr;}
  .fii-grid{grid-template-columns:1fr 1fr 1fr;}
  .sr-grid{grid-template-columns:1fr;}
  .nt-table th,.nt-table td{font-size:11px;padding:6px 8px;}
}

/* ── RESPONSIVE — MOBILE (≤ 640px) ── */
@media(max-width:640px){
  body{font-size:13px;}
  .wrap{padding:8px 6px;}

  /* Top nav — hide tab buttons, keep brand + PDF */
  .tn-tabs{display:none;}
  .topnav{padding:0 10px;justify-content:space-between;}
  .tn-brand{font-size:11px;}

  /* KPI tiles — 2 per row */
  .kpi-row{grid-template-columns:repeat(2,1fr);gap:8px;}
  .kpi{padding:12px 10px;}
  .kpi-val{font-size:18px;}

  /* Cards */
  .card,.perf-card,.sip-signal-card,.rp-toggle-wrap{padding:12px;}
  .dash-header{padding:14px 14px;}
  .dash-title h1{font-size:17px;}

  /* Exec summary grids */
  .brief-grid{grid-template-columns:1fr!important;}
  .stance-row{grid-template-columns:repeat(2,1fr)!important;}
  .exec-grid{grid-template-columns:1fr!important;}

  /* Sector scorecard table — allow horizontal scroll */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .sector-table{min-width:520px;font-size:11px;}
  .sector-table th,.sector-table td{padding:6px 6px;}

  /* Charts */
  .chart-row{gap:8px;}
  .canvas-wrap{height:160px!important;}

  /* FII/DII grid — stack vertically */
  .fii-grid{grid-template-columns:1fr!important;}

  /* Sector rotation grid — stack */
  .sr-grid{grid-template-columns:1fr!important;}

  /* Top sector cards — full width */
  .stocks-grid{grid-template-columns:1fr!important;}
  .insight-grid,.winner-loser-grid,.scenario-grid{grid-template-columns:1fr!important;}

  /* Fund groups table — horizontal scroll */
  .fund-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .fund-table{min-width:480px;font-size:11px;}

  /* Allocation pie */
  .alloc-grid{grid-template-columns:repeat(2,1fr)!important;}

  /* Mini nav — horizontal scroll */
  .mini-nav{overflow-x:auto;flex-wrap:nowrap;padding:8px 10px;}
  .mini-nav-btn{white-space:nowrap;font-size:10px;padding:4px 8px;}

  /* Tab nav bottom bar */
  .tab-nav-bar{flex-wrap:wrap;gap:6px;}
  .tab-prev-btn,.tab-next-btn{font-size:11px;padding:6px 10px;}

  /* Headcount cards */
  .hc-extra{grid-template-columns:1fr!important;}
  .hc-card{padding:12px;}

  /* Nifty targets table */
  .nt-table th,.nt-table td{font-size:10px;padding:5px 6px;}

  /* Geo section */
  .geo-alert{flex-direction:column;gap:10px;padding:12px;}
  .geo-alert-stats{gap:8px;}
  .geo-stat{padding:4px 8px;}
  .geo-stat-val{font-size:13px;}

  /* Intro grid */
  .intro-grid{grid-template-columns:1fr!important;}

  /* Q&A */
  details summary{font-size:12px;}

  /* Improvements log PIN gate */
  .impr-pin-gate{padding:24px 16px;}

  /* Misc */
  .section-title{font-size:11px;}
  .hc-meta{flex-wrap:wrap;}
}

/* ── DATA CONFIDENCE BADGES ── */
.conf-verified{display:inline-block;background:#dcfce7;color:#15803d;border:1px solid #86efac;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px;vertical-align:middle;letter-spacing:.3px;}
.conf-predicted{display:inline-block;background:#fef9c3;color:#a16207;border:1px solid #fde047;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px;vertical-align:middle;letter-spacing:.3px;}
.conf-null{display:inline-block;background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px;vertical-align:middle;letter-spacing:.3px;}
.data-note{font-size:10px;color:var(--muted);font-style:italic;margin-top:4px;}

/* ── IMPROVEMENTS LOG (Tab 8) ── */
.impr-pin-gate{background:var(--card);border-radius:12px;padding:48px 32px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);max-width:400px;margin:40px auto;}
.impr-pin-gate h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.impr-pin-gate p{font-size:12px;color:var(--muted);margin-bottom:16px;}
.impr-pin-input{border:2px solid var(--border);border-radius:8px;padding:10px 16px;font-size:18px;width:160px;text-align:center;letter-spacing:4px;outline:none;margin-bottom:12px;display:block;margin:0 auto 12px;}
.impr-pin-input:focus{border-color:var(--accent);}
.impr-pin-btn{background:var(--accent);color:#0f2040;font-weight:700;border:none;border-radius:8px;padding:10px 24px;font-size:13px;cursor:pointer;margin-top:8px;}
.impr-pin-error{color:var(--red);font-size:12px;margin-top:8px;display:none;}
.impr-content{display:none;}
.impr-category{background:var(--card);border-radius:10px;padding:16px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.impr-category h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.impr-category h4::after{content:'';flex:1;height:1px;background:var(--border);}
.impr-item{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.impr-item:last-child{border-bottom:none;}
.impr-date{color:var(--muted);white-space:nowrap;min-width:70px;font-size:11px;}
.impr-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;}
.impr-badge.design{background:#e0f2fe;color:#0369a1;}
.impr-badge.data{background:#dcfce7;color:#166534;}
.impr-badge.governance{background:#fef9c3;color:#a16207;}
.impr-badge.architecture{background:#f3e8ff;color:#6b21a8;}
.impr-badge.security{background:#fee2e2;color:#991b1b;}
.impr-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.impr-stat{background:linear-gradient(135deg,#0f2040,#1a3a6b);color:#fff;border-radius:10px;padding:14px;text-align:center;}
.impr-stat-val{font-size:24px;font-weight:700;color:#f0a500;}
.impr-stat-lbl{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;}

/* ── PRINT STYLES ── */
@media print{
  .topnav,.tab-nav-bar,.tab-guide,.mini-nav,.pdf-section,.pdf-btn,.demo-banner,.rp-btn-row,.sip-note{display:none!important;}
  .tab-content{display:block!important;}
  body{background:#fff;padding-top:0!important;}
  .card,.kpi,.sector-card,.hc-card{box-shadow:none;border:1px solid #e2e8f0;}
  #tab2,#tab3,#tab4,#tab5,#tab6{page-break-before:always;}
  .canvas-wrap{height:200px!important;}
  .wrap{padding:8px;}
  .brief-grid{grid-template-columns:1fr 1fr;}
  .stance-row{grid-template-columns:repeat(3,1fr);}
}

/* ── ONE-LINE BRIEF ── */
.one-line-brief{background:linear-gradient(135deg,#0f2040,#1a3a6b);color:#fff;border-radius:8px;padding:12px 18px;margin-bottom:12px;font-size:13px;font-weight:700;line-height:1.5;letter-spacing:.1px;}

/* ── MINI NAV STRIP ── */
.mini-nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--card);border-radius:8px;padding:10px 14px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--border);}
.mini-nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-right:4px;white-space:nowrap;}
.mini-nav-btn{border:none;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:#f1f5f9;color:var(--text);transition:all .15s;white-space:nowrap;}
.mini-nav-btn:hover{background:#dbeafe;color:var(--blue);}
.mini-nav-btn.active{background:#0f2040;color:#f0a500;}

/* ── SIP SIGNAL CARD ── */
.sip-signal-card{background:var(--card);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;border-left:4px solid var(--accent);}
.sip-signal-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.sip-icon{font-size:18px;}
.sip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.sip-badge{color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.3px;}
.sip-reason{font-size:13px;color:var(--text);font-weight:600;margin-bottom:8px;}
.sip-note{font-size:11px;color:var(--muted);line-height:1.6;background:#f8fafc;border-radius:6px;padding:8px 10px;border-left:2px solid var(--border);}

/* ── FII/DII ── */
.fii-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.fii-cell{background:#f8fafc;border-radius:8px;padding:14px 16px;border:1px solid var(--border);text-align:center;}
.fii-who{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.fii-val{font-size:20px;font-weight:800;margin-bottom:4px;}
.fii-pos{color:var(--green);}.fii-neg{color:var(--red);}
.fii-desc{font-size:10px;color:var(--muted);}

/* ── NIFTY TARGETS ── */
.nt-table{border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.nt-header{display:grid;grid-template-columns:110px 110px 130px 80px 1fr;padding:8px 12px;background:#f8fafc;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
.nt-row{display:grid;grid-template-columns:110px 110px 130px 80px 1fr;padding:10px 12px;border-top:1px solid #f1f5f9;font-size:12px;align-items:center;}
.nt-bull{background:#f0fdf4;}.nt-base{background:#fff;}.nt-bear{background:#fef2f2;}
.nt-scenario{font-weight:700;}.nt-level{font-weight:800;font-size:14px;}.nt-pe{color:var(--muted);}.nt-pct{font-weight:800;font-size:14px;}.nt-condition{color:var(--muted);font-size:11px;}

/* ── RESULTS SEASON ── */
.rs-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;}
.rs-item{font-size:12px;padding:5px 0;border-bottom:1px solid #f1f5f9;line-height:1.4;}
.rs-item:last-child{border-bottom:none;}
.rs-ahead-header{display:grid;grid-template-columns:120px 130px 1fr;padding:6px 10px;background:#f8fafc;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-radius:6px 6px 0 0;border:1px solid var(--border);}
.rs-ahead-row{display:grid;grid-template-columns:120px 130px 1fr;padding:8px 10px;border:1px solid var(--border);border-top:none;font-size:11px;}
.rs-company{font-weight:700;}.rs-date{color:var(--blue);font-weight:600;}.rs-watch{color:var(--muted);}

/* ── SECTOR ROTATION ── */
.sr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.sr-box{border-radius:8px;padding:14px 16px;}
.sr-box-buy{background:#f0fdf4;border:1px solid #bbf7d0;}
.sr-box-rotate{background:#fef9c3;border:1px solid #fde68a;}
.sr-box-title{font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.sr-chips{display:flex;flex-wrap:wrap;gap:6px;}
.sr-fav{background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.sr-out{background:#fef9c3;color:#a16207;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.sr-next{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--text);margin-bottom:8px;}

/* ── RISK PROFILES ── */
.rp-toggle-wrap{background:var(--card);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;border-top:3px solid var(--teal);}
.rp-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.rp-btn{border:1px solid var(--border);background:#f1f5f9;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.rp-btn:hover{background:#dbeafe;border-color:#bfdbfe;}
.rp-btn-active{background:#0f2040!important;color:#f0a500!important;border-color:#0f2040!important;}
.rp-card{background:#f8fafc;border-radius:8px;padding:12px 14px;border:1px solid var(--border);}
.rp-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.rp-desc{font-size:11px;color:var(--muted);margin-bottom:8px;}
.rp-alloc-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
.rp-alloc-row:last-child{border-bottom:none;}

/* ── CHANGELOG ── */
.cl-header{display:grid;grid-template-columns:120px 140px 20px 140px 1fr;padding:8px 10px;background:#f8fafc;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-radius:6px 6px 0 0;border:1px solid var(--border);}
.cl-row{display:grid;grid-template-columns:120px 140px 20px 140px 1fr;padding:9px 10px;border:1px solid var(--border);border-top:none;font-size:12px;align-items:center;}
.cl-upgrade{background:#f0fdf4;}.cl-downgrade{background:#fef2f2;}.cl-change{background:#fff;}
.cl-sector{font-weight:700;}.cl-from{color:var(--muted);}.cl-arrow{color:var(--muted);text-align:center;font-weight:700;}.cl-to{font-weight:600;}.cl-reason{color:var(--muted);font-size:11px;}

/* ── INVESTMENT BRIEF (Investor-First Exec Summary) ── */
.brief-header{background:linear-gradient(135deg,#0f2040,#1a3a6b);border-radius:12px;padding:20px 24px;margin-bottom:14px;color:#fff;}
.brief-title{font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:14px;}
.brief-title span{color:#f0a500;}
.stance-row{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;background:rgba(255,255,255,.08);border-radius:8px;overflow:hidden;}
.stance-cell{padding:11px 12px;background:rgba(255,255,255,.04);text-align:center;}
.stance-cell.primary{background:rgba(240,165,0,.18);border:1px solid rgba(240,165,0,.35);}
.stance-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.5);margin-bottom:4px;}
.stance-val{font-size:12px;font-weight:800;color:#fff;line-height:1.25;}
.stance-val.sv-green{color:#4ade80;}.stance-val.sv-amber{color:#f0a500;}.stance-val.sv-red{color:#f87171;}

/* Brief cards grid */
.brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.brief-card{background:var(--card);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid var(--blue);}
.brief-card.bc-signal{border-left-color:var(--green);}
.brief-card.bc-sectors{border-left-color:var(--blue);}
.brief-card.bc-buy{border-left-color:#0f2040;}
.brief-card.bc-lead{border-left-color:var(--purple);}
.brief-card.bc-ladder{border-left-color:var(--accent);}
.brief-card.bc-geo{border-left-color:var(--teal);}
.brief-card.bc-avoid{border-left-color:var(--red);background:#fef2f2;}
.bc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.bc-label .bc-tag{padding:2px 6px;border-radius:4px;background:#f1f5f9;font-size:9px;color:var(--muted);font-weight:600;}
.bc-val{font-size:12px;color:var(--text);line-height:1.65;}

/* Conviction sector table */
.conv-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;}
.conv-tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:4px 6px;text-align:left;border-bottom:1px solid var(--border);}
.conv-tbl td{padding:5px 6px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.conv-tbl tr:last-child td{border-bottom:none;}
.cv-high{background:#dcfce7;color:#15803d;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;white-space:nowrap;}
.cv-med{background:#fef9c3;color:#a16207;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;white-space:nowrap;}
.cv-low{background:#fee2e2;color:#b91c1c;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;white-space:nowrap;}

/* Buy ladder */
.ladder-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
.ladder-row:last-child{border-bottom:none;}
.ladder-level{min-width:100px;font-weight:700;color:var(--text);font-size:11px;flex-shrink:0;}
.ladder-action{color:var(--muted);flex:1;line-height:1.4;}

/* IF-THEN geo scenarios */
.ifthen-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.ifthen-col{border-radius:6px;padding:10px 12px;font-size:11px;line-height:1.5;}
.ifthen-col.ift-green{background:#f0fdf4;border:1px solid #bbf7d0;}
.ifthen-col.ift-red{background:#fff1f2;border:1px solid #fecaca;}
.ifthen-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.ifthen-col.ift-green .ifthen-lbl{color:#16a34a;}
.ifthen-col.ift-red .ifthen-lbl{color:#dc2626;}

/* Avoid items */
.avoid-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;font-size:11px;line-height:1.5;}
.avoid-item:last-child{margin-bottom:0;}
.risk-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;}
.rb-high{background:#fee2e2;color:#b91c1c;}.rb-med{background:#fef9c3;color:#a16207;}

/* Exec link button */
.exec-link{color:var(--blue);text-decoration:none;border-bottom:1px dashed var(--blue);cursor:pointer;font-size:11px;background:none;border-top:none;border-left:none;border-right:none;padding:0;}
.exec-link:hover{opacity:.75;}

/* ── TAB GUIDE ── */
.tab-guide{background:var(--card);border-radius:12px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tab-guide-header{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;}
.tab-guide-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.tab-guide-item{background:#f8fafc;border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.tab-guide-item:hover{border-color:#bfdbfe;background:#eff6ff;}
.tab-guide-item.current{border-color:#f0a500;background:#fffbeb;}
.tab-guide-icon{font-size:18px;margin-bottom:3px;}
.tab-guide-num{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.tab-guide-title{font-size:11px;font-weight:700;color:var(--text);margin-top:2px;}
.tab-guide-desc{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3;}
.tab-flow{display:flex;align-items:center;gap:4px;margin-top:10px;flex-wrap:wrap;}
.tab-flow-item{font-size:10px;font-weight:600;color:var(--blue);cursor:pointer;padding:2px 6px;border-radius:4px;background:#eff6ff;transition:all .15s;}
.tab-flow-item:hover{background:#dbeafe;}
.tab-flow-arrow{font-size:12px;color:var(--border);margin:0 2px;}

/* ── TAB NAVIGATION ── */
.tab-nav-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 0 4px;border-top:1px solid var(--border);margin-top:24px;}
.tab-prev-btn,.tab-next-btn{border:none;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.tab-prev-btn{background:#f1f5f9;color:var(--text);}.tab-prev-btn:hover{background:#e2e8f0;}
.tab-next-btn{background:#0f2040;color:#f0a500;}.tab-next-btn:hover{background:#1a3a6b;}

/* ── GLOSSARY ── */
.glos-cat{margin-bottom:22px;}
.glos-cat-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);padding:6px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;display:inline-block;margin-bottom:10px;}
.glos-item{border-bottom:1px solid #f1f5f9;padding:12px 0;}.glos-item:last-child{border-bottom:none;}
.glos-term{font-size:13px;font-weight:700;color:var(--text);}
.glos-abbr{font-size:10px;font-weight:600;color:var(--blue);background:#eff6ff;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;}
.glos-def{font-size:12px;color:var(--text);line-height:1.6;margin-top:4px;}
.glos-ex{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;padding:4px 8px;background:#f8fafc;border-radius:4px;border-left:2px solid var(--border);}

/* ── DEMO BANNER ── */
.demo-banner{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  background:#dc2626;color:#fff;
  padding:10px 20px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:13px;font-weight:700;letter-spacing:0.3px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.demo-banner-icon{font-size:16px;}
.demo-banner a{color:#fde68a;text-decoration:underline;margin-left:6px;font-weight:600;}
/* push page content below fixed banner */
body{padding-top:42px;}
/* diagonal watermark on every tab */
.tab-content::before{
  content:"TEMPLATE DEMO — NOT REAL DATA";
  position:fixed;bottom:60px;right:-60px;
  transform:rotate(-35deg);
  font-size:11px;font-weight:800;letter-spacing:2px;
  color:rgba(220,38,38,0.08);
  pointer-events:none;white-space:nowrap;font-family:monospace;
  z-index:0;
}
/* ── STALE DATA NOTICE (keep but secondary) ── */
.stale-notice{display:none;}/* replaced by demo-banner */

@media(max-width:900px){.tab-guide-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.tab-guide-grid{grid-template-columns:repeat(2,1fr);}.action-item{flex-direction:column;gap:8px;}.action-num{width:28px;height:28px;font-size:13px;}}
</style>

<body>

<div id="nav-root"></div>
<div class="wrap">
  <div id="tab1" class="tab-content active"></div>
  <div id="tab2" class="tab-content"></div>
  <div id="tab3" class="tab-content"></div>
  <div id="tab4" class="tab-content"></div>
  <div id="tab5" class="tab-content"></div>
  <div id="tab6" class="tab-content"></div>
  <div id="tab7" class="tab-content"></div>
  <div id="tab8" class="tab-content"></div>
</div>

<script>
/* ============================================================
   INDIA MARKET INTELLIGENCE — TEMPLATE RENDERER v3.0
   Tab-based layout. All sections rendered from D (injected JSON).
   To update design: edit TEMPLATE.html
   To update data: re-run skill → new JSON → node render.js
   ============================================================ */

// ── Utilities ──────────────────────────────────────────────────────────────────

// Only render links for real, non-placeholder URLs
const isValidUrl = (url) => {
  if (!url || typeof url !== 'string') return false;
  if (!url.startsWith('http')) return false;
  if (url.length < 22) return false;                     // too short
  if (url.endsWith('...') || url.includes('/...')) return false; // placeholder
  if (url.endsWith('/') && url.split('/').length <= 4) return false; // bare domain
  return true;
};

const chip = (label, url) => isValidUrl(url)
  ? `<a href="${url}" class="src-chip" target="_blank" rel="noopener">${label}</a>`
  : `<span class="src-chip" title="Source reference — run skill for live URL">${label}</span>`;

const dataLink = (text, url) => isValidUrl(url)
  ? `<a href="${url}" class="data-link" target="_blank" rel="noopener">${text}</a>`
  : `<span class="data-est" title="Run skill for live source link">${text}</span>`;

const srcRow = (sources) => {
  if (!sources || !sources.length) return '';
  return `<div class="source-row"><span class="src-label">Sources:</span>${sources.map(s => chip(s.label, s.url)).join('')}</div>`;
};

const pill = (text, cls) => `<span class="pill ${cls}">${text}</span>`;

const sectionTitle = (id, icon, text, extraCls) =>
  `<div id="${id}" class="section-title${extraCls ? ' ' + extraCls : ''}">${icon} ${text}</div>`;

const valBadge = (v) => {
  if (!v) return '';
  const map = {
    'Cheap vs history': 'val-cheap-hist',
    'Cheap vs 2024':    'val-cheap-2024',
    'Fair':             'val-fair',
    'Expensive':        'val-expensive'
  };
  const cls = map[v] || 'val-fair';
  return `<span class="val-badge ${cls}">${v}</span>`;
};

const fmtReturn = (v) => {
  if (v == null) return '<span style="color:var(--muted)">—</span>';
  const n = parseFloat(v);
  const color = n >= 0 ? 'var(--green)' : 'var(--red)';
  return `<span style="color:${color};font-weight:700;">${n >= 0 ? '+' : ''}${n}%</span>`;
};

// ── TAB GUIDE ─────────────────────────────────────────────────────────────────
function buildTabGuide() {
  const tabs = [
    {n:1, icon:'🏠', title:'Overview',   desc:'Action Plan · KPIs · Geo Alert · Nav'},
    {n:2, icon:'📈', title:'Markets',    desc:'P/E signal · Entry levels · Sector Scorecard'},
    {n:3, icon:'🎯', title:'Sectors',    desc:'Govt Capex · Top picks · Stock ideas'},
    {n:4, icon:'💰', title:'Allocation', desc:'Headcount signals · Fund recommendations'},
    {n:5, icon:'❓', title:'Q&A / PDF',  desc:'About this report · FAQs · PDF download'},
    {n:6, icon:'📖', title:'Glossary',   desc:'All terms · Methodology · Sources'}
  ];
  return `<div class="tab-guide">
  <div class="tab-guide-header">📋 Report Guide — How to use this report <span style="font-size:11px;font-weight:400;color:var(--muted);">Click any tab to jump directly</span></div>
  <div class="tab-guide-grid">
    ${tabs.map(t => `
    <div class="tab-guide-item${t.n===1?' current':''}" onclick="switchTab(${t.n})">
      <div class="tab-guide-icon">${t.icon}</div>
      <div class="tab-guide-num">Tab ${t.n} of 6</div>
      <div class="tab-guide-title">${t.title}</div>
      <div class="tab-guide-desc">${t.desc}</div>
    </div>`).join('')}
  </div>
  <div class="tab-flow">
    <span style="font-size:10px;font-weight:600;color:var(--muted);margin-right:4px;">Recommended order:</span>
    ${tabs.map((t,i) => `<span class="tab-flow-item" onclick="switchTab(${t.n})">${t.icon} ${t.title}</span>${i < tabs.length-1 ? '<span class="tab-flow-arrow">→</span>' : ''}`).join('')}
  </div>
</div>`;
}

// ── TAB NAVIGATION BAR ────────────────────────────────────────────────────────
function buildTabNav(current) {
  const labels = ['Overview','Markets','Sectors','Allocation','Track Record','Q&A / PDF','Glossary','Log'];
  const icons  = ['🏠','📈','🎯','💰','📊','❓','📖','📋'];
  const prev = current > 1 ? current - 1 : null;
  const next = current < 8 ? current + 1 : null;
  return `<div class="tab-nav-bar">
    ${prev ? `<button class="tab-prev-btn" onclick="switchTab(${prev})">← ${icons[prev-1]} ${labels[prev-1]}</button>` : '<span></span>'}
    ${next ? `<button class="tab-next-btn" onclick="switchTab(${next})">Next: ${icons[next-1]} ${labels[next-1]} →</button>` : '<span style="font-size:11px;color:var(--muted);">✅ You\'ve reviewed the full report</span>'}
  </div>`;
}

// ── MINI NAV STRIP ────────────────────────────────────────────────────────────
function buildMiniNav() {
  const tabs = [
    {n:1,icon:'🏠',title:'Overview'},{n:2,icon:'📈',title:'Markets'},
    {n:3,icon:'🎯',title:'Sectors'},{n:4,icon:'💰',title:'Allocation'},
    {n:5,icon:'📊',title:'Track Record'},{n:6,icon:'❓',title:'Q&A / PDF'},
    {n:7,icon:'📖',title:'Glossary'},{n:8,icon:'📋',title:'Log'}
  ];
  return `<div class="mini-nav">
    <span class="mini-nav-label">Navigate →</span>
    ${tabs.map(t=>`<button class="mini-nav-btn${t.n===1?' active':''}" onclick="switchTab(${t.n})">${t.icon} ${t.title}</button>`).join('')}
  </div>`;
}

// ── SIP TOP-UP SIGNAL (derived from P/E) ──────────────────────────────────────
function buildSipSignal() {
  const pe = D.kpi?.nifty_pe?.value;
  if (!pe) return '';
  let signal, reason, color;
  if      (pe < 18) { signal='STRONGLY INCREASE SIP'; reason=`P/E ${pe}x = Deep Value. Increase SIP by 50% and add lumpsum aggressively — historically highest probability of strong returns.`; color='#16a34a'; }
  else if (pe < 20) { signal='INCREASE SIP'; reason=`P/E ${pe}x = Good Value. Increase your monthly SIP by 20–25% this month. History shows positive 1yr returns with high probability at this level.`; color='#2563eb'; }
  else if (pe < 22) { signal='MAINTAIN SIP + PARTIAL LUMPSUM'; reason=`P/E ${pe}x = Fair Value. Keep all existing SIPs running and deploy up to 50% of available lumpsum. Avoid all-in single deployment.`; color='#f0a500'; }
  else if (pe < 24) { signal='MAINTAIN SIP ONLY'; reason=`P/E ${pe}x = Slightly Expensive. Continue all existing SIPs but pause any fresh lumpsum investment. Wait for a dip below 22x P/E.`; color='#ea580c'; }
  else              { signal='MAINTAIN SIP — PAUSE LUMPSUM'; reason=`P/E ${pe}x = Expensive. Keep existing SIPs running (never stop a running SIP) but do NOT add new lumpsum at this level. Wait for correction.`; color='#dc2626'; }
  return `<div class="sip-signal-card">
    <div class="sip-signal-header">
      <span class="sip-icon">📅</span>
      <span class="sip-label">Monthly SIP Top-Up Signal</span>
      <span class="sip-badge" style="background:${color};">${signal}</span>
    </div>
    <div class="sip-reason">${reason}</div>
    <div class="sip-note">💡 <strong>What is this signal?</strong> Your existing SIPs always continue regardless of this signal. This tells you whether to <em>increase</em> your SIP amount or add a one-time lumpsum — based purely on the current P/E zone vs 9 years of Nifty historical return data.</div>
  </div>`;
}

// ── FII / DII FLOW TRACKER ────────────────────────────────────────────────────
function buildFiiDii() {
  const fd = D.fii_dii;
  if (!fd) return '';
  const fmt = v => v != null ? (v >= 0 ? `+₹${Math.abs(v).toLocaleString('en-IN')} Cr` : `-₹${Math.abs(v).toLocaleString('en-IN')} Cr`) : '—';
  const fiiPos = (fd.fii_net_cr||0) >= 0, diiPos = (fd.dii_net_cr||0) >= 0, retPos = (fd.retail_net_cr||0) >= 0;
  const cells = [
    {who:'🌐 Foreign (FII/FPI)', val:fmt(fd.fii_net_cr), pos:fiiPos, desc: fiiPos ? 'Net Buyers — Bullish signal':'Net Sellers — Watch closely'},
    {who:'🏦 Domestic (DII/MF)', val:fmt(fd.dii_net_cr), pos:diiPos, desc: diiPos ? 'Net Buyers — Domestic confidence':'Net Sellers — Caution'},
    {who:'👤 Retail (Cash Mkt)', val:fmt(fd.retail_net_cr), pos:retPos, desc: retPos ? 'Net Buyers':'Net Sellers'}
  ];
  return `
  ${sectionTitle('sec-fii','💸','FII / DII Flow Tracker')}
  <div class="card" style="margin-bottom:14px;">
    <div class="card-title">Institutional Money Flows <span class="card-subtitle">${fd.period||''}</span></div>
    <div class="fii-grid">${cells.map(c=>`<div class="fii-cell">
      <div class="fii-who">${c.who}</div>
      <div class="fii-val ${c.pos?'fii-pos':'fii-neg'}">${c.val}</div>
      <div class="fii-desc">${c.desc}</div>
    </div>`).join('')}</div>
    ${fd.interpretation ? `<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text);">📌 <strong>Reading:</strong> ${fd.interpretation}</div>` : ''}
  </div>`;
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────────
function switchTab(n) {
  document.querySelectorAll('.tab-content').forEach((t, i) => {
    t.classList.toggle('active', i === n - 1);
  });
  document.querySelectorAll('.tn-tab').forEach((t, i) => {
    t.classList.toggle('active', i === n - 1);
  });
  // Update tab guide highlight (tab guides exist in Tab 1 only)
  document.querySelectorAll('.tab-guide-item').forEach((t, i) => {
    t.classList.toggle('current', i === n - 1);
  });
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goToSection(tabN, sectionId) {
  switchTab(tabN);
  setTimeout(() => {
    const el = document.getElementById(sectionId);
    if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
  }, 80);
}

function selectRiskProfile(key) {
  ['conservative','balanced','aggressive'].forEach(k => {
    const el = document.getElementById('rp-'+k);
    if (el) el.style.display = k === key ? 'block' : 'none';
  });
  document.querySelectorAll('.rp-btn').forEach((btn, i) => {
    const keys = ['conservative','balanced','aggressive'];
    btn.classList.toggle('rp-btn-active', keys[i] === key);
  });
}

    return `<div class="perf-card">

  }

  const rows = recs.map(r => {
    const gainCls = r.gain_pct > 0 ? 'perf-gain' : r.gain_pct < 0 ? 'perf-loss' : 'perf-neutral';
    const verdictCls = r.verdict === 'On track' || r.verdict === 'Exceeded target' ? 'p-green' : r.verdict === 'Underperforming' ? 'p-red' : 'p-gray';
    // Support sector-specific index levels (entry_index / current_index) with fallback to entry_nifty / current_nifty
    const entryVal  = r.entry_index  != null ? r.entry_index  : r.entry_nifty;
    const currentVal = r.current_index != null ? r.current_index : r.current_nifty;
    const indexLbl  = r.index_label || 'Nifty 50';
    return `<tr>
      <td style="font-weight:600;">${r.sector}</td>
      <td>${pill(r.action || '—', 'p-blue')}</td>
      <td><span style="font-size:10px;color:var(--muted);display:block;">${indexLbl}</span>${entryVal != null ? Number(entryVal).toLocaleString() : '—'}</td>
      <td><span style="font-size:10px;color:var(--muted);display:block;">${indexLbl}</span>${currentVal != null ? Number(currentVal).toLocaleString() : '—'}</td>
      <td class="${gainCls}">${r.gain_pct != null ? (r.gain_pct >= 0 ? '+' : '') + r.gain_pct + '%' : '—'}</td>
      <td>${pill(r.verdict || '—', verdictCls)}</td>
    </tr>`;
  }).join('');

  return `<div class="perf-card">
    <h3>📊 Prior Report Performance Tracker <span style="font-size:11px;font-weight:400;color:var(--muted);">vs. ${pc.prior_date} recommendations</span></h3>

}

// ── KPI ROW (with MoM delta integrated) ──────────────────────────────────────
function buildKpiRow() {
  const k = D.kpi || {}, p = D.prior || {};

  function momDelta(curr, prev, worseUp) {
    if (curr == null || prev == null) return '';
    const d = parseFloat((curr - prev).toFixed(2));
    if (d === 0) return `<div class="kpi-delta delta-neu">→ no change</div>`;
    const cls = worseUp ? (d > 0 ? 'delta-up' : 'delta-dn') : (d > 0 ? 'delta-dn' : 'delta-up');
    const arrow = d > 0 ? '↑' : '↓';
    return `<div class="kpi-delta ${cls}">${arrow} ${Math.abs(d)} vs prior</div>`;
  }

  const tiles = [
    {cls:'green',  lbl:'Nifty 50 P/E (Nifty 50)',val:(k.nifty_pe?.value||'—')+'x',   url:k.nifty_pe?.source_url,  sub:k.nifty_pe?.zone||'',    tag:k.nifty_pe?.signal||'',  tcls:'p-green',  delta:momDelta(k.nifty_pe?.value, p.nifty_pe, true)},
    {cls:'blue',   lbl:'Sensex P/E',              val:(k.sensex_pe?.value||'—')+'x',  url:k.sensex_pe?.source_url, sub:'Cross-validation',       tag:k.sensex_pe?.signal||'', tcls:'p-blue',   delta:''},
    {cls:'orange', lbl:'Brent Crude',             val:'$'+(k.brent?.value||'—')+'/bbl',url:k.brent?.source_url,   sub:k.brent?.trend||'',       tag:k.brent?.tag||'',        tcls:'p-orange', delta:momDelta(k.brent?.value, p.brent, true)},
    {cls:'red',    lbl:'INR / USD',               val:'₹'+(k.inr_usd?.value||'—'),    url:k.inr_usd?.source_url,  sub:k.inr_usd?.sub||'',       tag:k.inr_usd?.tag||'',      tcls:'p-red',    delta:momDelta(k.inr_usd?.value, p.inr_usd, true)},
    {cls:'amber',  lbl:'Gold (Spot)',              val:'$'+(k.gold?.value||'—')+'/oz', url:k.gold?.source_url,     sub:'Spot price',              tag:k.gold?.tag||'',         tcls:'p-amber',  delta:momDelta(k.gold?.value, p.gold, false)},
    {cls:'purple', lbl:'Govt Capex FY27',          val:k.capex?.value||'—',            url:k.capex?.source_url,    sub:'Union Budget total',      tag:'Annual',                tcls:'p-purple', delta:''}
  ];
  return `<div class="kpi-row">${tiles.map(t => `
  <div class="kpi ${t.cls}">
    <div class="kpi-lbl">${t.lbl}</div>
    <div class="kpi-val">${dataLink(t.val, t.url)}</div>
    <div class="kpi-sub">${t.sub}</div>
    ${t.tag ? `<span class="kpi-tag ${t.tcls}">${t.tag}</span>` : ''}
    ${t.delta || ''}
  </div>`).join('')}</div>`;
}

// ── INVESTMENT BRIEF (Investor-First Exec Summary) ───────────────────────────
function buildExecSummary() {
  const es = D.executive_summary || {};
  const k  = D.kpi || {};
  const pc = D.performance_comparison || {};

  // ── Stance dashboard values ──
  const stance      = es.market_stance      || 'CAUTIOUSLY BULLISH';
  const deployPct   = es.deploy_pct         != null ? es.deploy_pct   : 60;
  const holdPct     = es.hold_cash_pct      != null ? es.hold_cash_pct : (100 - deployPct);
  const sipAction   = es.sip_action         || 'Start SIP immediately';
  const histReturn  = es.hist_return_at_pe  || '—';
  const pe          = k.nifty_pe?.value     || '—';
  const zone        = k.nifty_pe?.zone      || '—';
  const stanceColor = stance.includes('BULLISH') ? 'sv-green' : stance.includes('NEUTRAL') ? 'sv-amber' : 'sv-red';

  // ── Conviction Sectors table ──
  const bs = es.best_sectors || [];
  const sectorsHtml = (() => {
    if (!bs.length) return '<div class="bc-val">—</div>';
    const rows = bs.map(s => {
      const name       = typeof s === 'string' ? s : (s.name || '—');
      const conviction = s.conviction    || 'Medium';
      const allocPct   = s.allocation_pct != null ? `${s.allocation_pct}%` : '—';
      const entry      = s.entry         || 'Current';
      const target     = s.target_12m    || '—';
      const cvCls      = conviction === 'High' ? 'cv-high' : conviction === 'Medium' ? 'cv-med' : 'cv-low';
      return `<tr>
        <td style="font-weight:600;">${name}</td>
        <td><span class="${cvCls}">${conviction}</span></td>
        <td style="font-weight:700;color:var(--blue);">${allocPct}</td>
        <td style="color:var(--muted);">${entry}</td>
        <td style="color:var(--green);font-weight:700;">${target}</td>
      </tr>`;
    }).join('');
    return `<table class="conv-tbl">
      <thead><tr><th>Sector</th><th>Conviction</th><th>Alloc%</th><th>Entry</th><th>12M Target</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  })();

  // ── Buy Ladder — parse watchlist_triggers on · separator ──
  const watchText = es.watchlist_triggers || '';
  const ladderHtml = (() => {
    if (!watchText) return '<div class="bc-val">—</div>';
    const items = watchText.split('·').map(i => i.trim()).filter(Boolean);
    return items.map(item => {
      const colon = item.indexOf(':');
      const level  = colon > -1 ? item.slice(0, colon).trim() : item;
      const action = colon > -1 ? item.slice(colon + 1).trim() : '';
      return `<div class="ladder-row">
        <div class="ladder-level">${level}</div>
        <div class="ladder-action">${action}</div>
      </div>`;
    }).join('');
  })();

  // ── Geo Playbook — parse Scenario A / Scenario B from geo_watch ──
  const geoText = es.geo_watch || '';
  const matchA  = geoText.match(/Scenario A[^:]*:\s*([^.]+(?:\.[^S][^c])*)/i);
  const matchB  = geoText.match(/Scenario B[^:]*:\s*([\s\S]+)/i);
  const scenA   = matchA ? matchA[1].trim() : (geoText.split('.')[0] || '—');
  const scenB   = matchB ? matchB[1].split('.').slice(0,2).join('.').trim() : '—';

  // ── What to Avoid — split on · ──
  const avoidItems = (es.what_to_avoid || '').split('·').map(i => i.trim()).filter(Boolean);
  const avoidHtml  = avoidItems.map(item =>
    `<div class="avoid-item"><span class="risk-badge rb-high">AVOID</span><span>${item}</span></div>`
  ).join('');

  // ── Prior performance banner ──
  const perfBanner = pc.summary
    ? `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text);">
        📊 <strong>Prior calls performance:</strong> ${pc.summary}
        <button class="exec-link" style="margin-left:8px;" onclick="goToSection(1,'sec-exec-perf')">View tracker →</button>
      </div>`
    : '';

  return `
  ${sectionTitle('sec-exec','📋','Your Investment Decision Brief')}

// ── SECTION 0: GEO RISK ───────────────────────────────────────────────────────
function buildGeoSection() {
  const g = D.geo || {};
  const timeline = (g.timeline || []).map(t =>
    `<div class="tl-item"><div class="tl-dot"></div>
    <div class="tl-date">${t.date}</div>
    <div class="tl-text">${t.text}</div></div>`
  ).join('');

  const commBars = (g.commodities || []).map(c => {
    const cascadeHtml = (c.cascade_effects && c.cascade_effects.length)
      ? `<div class="cascade-chips">${c.cascade_effects.map(e => `<span class="cascade-chip">${e}</span>`).join('')}</div>`
      : '';
    return `<div class="commodity-row">
      <div class="com-main">
        <div class="com-name">${c.icon ? c.icon + ' ' : ''}${c.name}</div>
        <div class="com-bar-wrap"><div class="com-bar" style="width:${c.pct||50}%;background:${c.color||'#dc2626'};">${c.label||''}</div></div>
        <div class="com-price">${c.price||''}</div>
        <div class="com-change" style="color:${c.color||'var(--red)'};">${c.impact||''}</div>
      </div>
      ${cascadeHtml ? `<div style="width:100%;padding-left:140px;"><span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;">Cascade → </span>${cascadeHtml}</div>` : ''}
    </div>`;
  }).join('');

  const vulnItems = (g.vulnerability || []).map(v =>
    `<div class="vuln-item">
      <div class="vuln-label">${v.commodity}</div>
      <div class="vuln-bar-wrap"><div class="vuln-bar" style="width:${v.bar_pct||50}%;background:${v.color||'#dc2626'};">${v.india_exposure}</div></div>
      <div class="vuln-pct">${v.india_exposure}</div>
    </div>`
  ).join('');

  const winners = (g.winners || []).map(w =>
    `<div class="wl-item"><span>✅</span><span>${w}</span></div>`
  ).join('');
  const losers = (g.losers || []).map(l =>
    `<div class="wl-item"><span>⚠️</span><span>${l}</span></div>`
  ).join('');

  const sa = g.scenario_a || {}, sb = g.scenario_b || {};

  return `
  ${sectionTitle('sec-geo','⚠️','Section 0 — Geopolitical Risk & Market Impact','danger')}
  <div class="chart-row cols-21">
    <div class="card danger">
      <div class="card-title">📅 Crisis Timeline <span class="card-subtitle">${g.timeline_title||''}</span></div>
      <div class="timeline">${timeline}</div>
      <div style="margin-top:16px;">
        <div class="card-title">📦 Commodity Price Impact + Cascade Effects</div>
        ${commBars}
      </div>
      ${srcRow(g.sources)}
    </div>
    <div class="card">
      <div class="card-title">🇮🇳 India Vulnerability Scorecard</div>
      ${vulnItems}
      <div style="margin-top:14px;">
        <div class="winner-loser-grid">
          <div class="wl-col winners"><div class="wl-title w">✅ Winners</div>${winners}</div>
          <div class="wl-col losers"><div class="wl-title l">⚠️ Losers</div>${losers}</div>
        </div>
      </div>
      ${srcRow(g.sources)}
    </div>
  </div>
  <div class="card">
    <div class="card-title">🔀 Geo-Risk Scenario Analysis <span class="card-subtitle">Two investment paths depending on conflict resolution</span></div>
    <div class="scenario-grid">
      <div class="scenario-card resolve">
        <div class="scenario-title" style="color:var(--green);">Scenario A — ${sa.label||'Resolves (3 months)'}</div>
        ${[['Brent',sa.brent],['INR',sa.inr],['Top Sector',sa.top_sector],['Avoid',sa.avoid],['Signal',sa.nifty_signal]].map(r=>
          `<div class="scenario-row"><span class="scenario-lbl">${r[0]}</span><span>${r[1]||'—'}</span></div>`
        ).join('')}
      </div>
      <div class="scenario-card extend">
        <div class="scenario-title" style="color:var(--orange);">Scenario B — ${sb.label||'Extends (6+ months)'}</div>
        ${[['Brent',sb.brent],['INR',sb.inr],['Top Sector',sb.top_sector],['Avoid',sb.avoid],['Signal',sb.nifty_signal]].map(r=>
          `<div class="scenario-row"><span class="scenario-lbl">${r[0]}</span><span>${r[1]||'—'}</span></div>`
        ).join('')}
      </div>
    </div>
    ${srcRow(g.sources)}
  </div>`;
}

  const mp = D.market_pulse || {};

  const pe = k.nifty_pe?.value || 0;
  const markerPct = Math.min(100, Math.max(0, ((pe - 15) / 15) * 100));

  const peZones = [
    {range:'< 18x',  zone:'Deep Value',       ret1:'~40%+',  ret3:'~25%+',  pos:'~100%', sig:'🟢 Strong Buy', scls:'p-green'},
    {range:'18–20x', zone:'Cheap',            ret1:'~35%',   ret3:'~22%',   pos:'~100%', sig:'🟢 Buy',        scls:'p-green'},
    {range:'20–22x', zone:'Fair Value',        ret1:'~30.8%', ret3:'~20.5%', pos:'100%',  sig:'🟢 Buy',        scls:'p-green'},
    {range:'22–24x', zone:'Slightly Elevated', ret1:'~20.6%', ret3:'~11.4%', pos:'100%',  sig:'🔵 Buy/Hold',   scls:'p-blue'},
    {range:'24–26x', zone:'Expensive',         ret1:'~11.7%', ret3:'~7.4%',  pos:'94%',   sig:'🟡 Hold',       scls:'p-amber'},
    {range:'26–28x', zone:'Very Expensive',    ret1:'~7.1%',  ret3:'~14.0%', pos:'80%',   sig:'🟠 Caution',    scls:'p-orange'},
    {range:'> 28x',  zone:'Bubble',            ret1:'~−2.9%', ret3:'~13.6%', pos:'38%',   sig:'🔴 Avoid Lump', scls:'p-red'}
  ];

  const ec = mp.entry_context || {};
  const wt = mp.watchlist_triggers || [];

  return `
  ${sectionTitle('sec-pulse','📈','Section 1 — Market Pulse & P/E Signal')}
  <div class="chart-row cols-21">
    <div class="card">
      <div class="card-title">P/E Zone Spectrum <span class="card-subtitle">Current: ${pe}x — ${k.nifty_pe?.zone||''}</span></div>
      <div class="pe-zone-bar">
        <div class="pe-marker" style="left:${markerPct}%;" data-val="${pe}x"></div>
      </div>
      <div class="pe-zone-labels"><span>15x</span><span>18x</span><span>20x</span><span>22x</span><span>24x</span><span>26x</span><span>28x</span><span>30x+</span></div>
      <div style="margin-top:14px;">
        <div class="card-title">Avg Returns by P/E Band <span class="card-subtitle">Historical Nifty 50 (9yr, ex-COVID)</span></div>
        <div class="canvas-wrap short"><canvas id="peZoneChart"></canvas></div>
      </div>
      ${srcRow(mp.sources)}
    </div>
    <div class="card">
      <div class="card-title">Current Signal</div>
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:52px;font-weight:800;color:var(--green);">${mp.pe_zone||'BUY'}</div>
        <div style="font-size:13px;color:var(--muted);margin:6px 0;">Nifty 50 P/E: ${dataLink(pe+'x', k.nifty_pe?.source_url)}</div>
        ${pill(mp.pe_signal||'🟢 BUY','p-green')}
      </div>
      <p style="font-size:12px;color:var(--text);line-height:1.7;margin-top:10px;">${mp.recommendation||''}</p>
    </div>
  </div>

  <div class="insight">
    <h3>📍 Entry Price Context — Where to Act on Pullbacks</h3>
    <div class="insight-grid">
      <div class="ins-item">
        <div class="ins-val" style="color:var(--blue);">${ec.current?.level?.toLocaleString()||'—'}</div>
        <div class="ins-lbl">Current (${ec.current?.pe||'—'}x)<br>${ec.current?.action||'BUY zone'}</div>
      </div>
      <div class="ins-item">
        <div class="ins-val" style="color:var(--green);">${ec.pullback_10?.level?.toLocaleString()||'—'}</div>
        <div class="ins-lbl">-10% pullback<br>${ec.pullback_10?.action||'Add more'}</div>
      </div>
      <div class="ins-item">
        <div class="ins-val" style="color:var(--orange);">${ec.pullback_20?.level?.toLocaleString()||'—'}</div>
        <div class="ins-lbl">-20% pullback<br>${ec.pullback_20?.action||'Lump sum'}</div>
      </div>
      <div class="ins-item">
        <div class="ins-val" style="color:var(--red);">${ec.pullback_30?.level?.toLocaleString()||'—'}</div>
        <div class="ins-lbl">-30% correction<br>${ec.pullback_30?.action||'Max allocation'}</div>
      </div>

  </div>

  <div class="card" style="margin-bottom:14px;">
    <div class="card-title">🎯 Watchlist Trigger Levels <span class="card-subtitle">Pre-defined action points — save these</span></div>

      <thead><tr><th>Nifty Level</th><th>P/E Est.</th><th>Recommended Action</th><th>Allocation %</th></tr></thead>
      <tbody>${wt.map(t =>
        `<tr><td style="font-weight:700;">${t.range}</td><td>${t.pe_est}</td>
        <td>${t.action}</td><td style="color:var(--blue);font-weight:600;">${t.allocation}</td></tr>`
      ).join('')}</tbody>
    </table></div>
  </div>

  <div class="card">
    <div class="card-title">📊 Full P/E Zone Reference Table <span class="card-subtitle">9-year Nifty 50 data (Mar 2016–Mar 2025, excl. COVID distortion)</span></div>
    <div class="tbl-wrap"><table class="dt">
      <thead><tr><th>P/E Range</th><th>Zone</th><th>Hist. Avg 1yr Return</th><th>Hist. Avg 3yr CAGR</th><th>% Positive (1yr)</th><th>Signal</th></tr></thead>
      <tbody>${peZones.map(z =>
        `<tr><td style="font-weight:700;">${z.range}</td><td>${z.zone}</td>
        <td style="color:var(--green);font-weight:600;">${z.ret1}</td>
        <td style="color:var(--blue);font-weight:600;">${z.ret3}</td>
        <td>${z.pos}</td><td>${pill(z.sig,z.scls)}</td></tr>`
      ).join('')}</tbody>
    </table></div>
    ${srcRow(mp.sources)}
  </div>`;
}

// ── SECTION 2: SECTOR SCORECARD ───────────────────────────────────────────────
function buildSectorScorecard() {
  const sectors = D.sectors || [];
  const sigMap = {green:'p-green',blue:'p-blue',amber:'p-amber',red:'p-red',teal:'p-teal'};

  const fullRows = sectors.map(s => {
    const geo = s.geo_overlay === 'winner'
      ? '<span style="color:var(--green);font-weight:600;">✅ Winner</span>'
      : s.geo_overlay === 'loser'
        ? '<span style="color:var(--red);font-weight:600;">⚠️ Loser</span>'
        : '<span style="color:var(--muted);">—</span>';
    const srcChip = s.source_url
      ? `<a href="${s.source_url}" class="src-chip" target="_blank" rel="noopener">${s.source_label||'Source'}</a>`
      : '';
    return `<tr>
      <td style="font-weight:600;">${s.name}${srcChip ? '<br><span style="margin-top:3px;display:inline-block;">'+srcChip+'</span>' : ''}</td>
      <td>${fmtReturn(s.return_ytd)}</td>
      <td>${fmtReturn(s.return_1yr)}</td>
      <td>${fmtReturn(s.return_prev_year)}</td>
      <td>${fmtReturn(s.return_3yr)}</td>
      <td>${fmtReturn(s.return_5yr)}</td>
      <td>${s.trend||'→'}</td>
      <td>${valBadge(s.valuation_vs_history || s.valuation)}</td>
      <td>${pill(s.signal_label||s.signal||'—', sigMap[s.signal]||'p-gray')}</td>
      <td>${geo}</td>
    </tr>`;
  }).join('');

  const quickRows = sectors.map(s => {
    return `<tr>
      <td style="font-weight:600;">${s.name}</td>
      <td>${fmtReturn(s.return_1yr)}</td>
      <td>${pill(s.signal_label||s.signal||'—', sigMap[s.signal]||'p-gray')}</td>
    </tr>`;
  }).join('');

  return `
  ${sectionTitle('sec-scorecard','📊','Section 2 — Sector Scorecard')}
  <div class="chart-row cols-21">
    <div class="card">
      <div class="card-title">1-Year Sector Returns (%) <span class="card-subtitle">Green = positive, Red = negative</span></div>
      <div class="canvas-wrap tall"><canvas id="sectorReturnChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Quick Signal Summary</div>
      <div class="tbl-wrap"><table class="dt">
        <thead><tr><th>Sector</th><th>1yr</th><th>Signal</th></tr></thead>
        <tbody>${quickRows}</tbody>
      </table></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Full Sector Scorecard <span class="card-subtitle">Extended returns + valuation vs history + source links</span></div>
    <div class="tbl-wrap"><table class="dt">
      <thead><tr><th>Sector</th><th>YTD</th><th>1yr</th><th>Prev Year</th><th>3yr CAGR</th><th>5yr CAGR</th><th>Trend</th><th>Valuation</th><th>Signal</th><th>Geo-Risk</th></tr></thead>
      <tbody>${fullRows}</tbody>
    </table></div>
    <div style="margin-top:8px;font-size:10px;color:var(--muted);">Source chips link to live data pages for each sector. Valuation vs history compares current sector P/E against its own 5-year average.</div>
  </div>`;
}

function buildTopSectors() {
  const ts = D.top_sectors || [];

    const stocksHtml = (s.stocks && s.stocks.length)
      ? `<div class="stocks-section">
          <div class="stocks-title">📈 Stock Ideas</div>
          <div class="stocks-grid">${s.stocks.map(st =>
            `<div class="stock-item">
              <div class="stock-ticker">${st.ticker || st.name}</div>
              <div class="stock-name">${st.name}</div>
              <div class="stock-cmp">₹${(st.cmp||0).toLocaleString()}</div>
              <div class="stock-rationale">${st.rationale||''}</div>
            </div>`
          ).join('')}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:6px;">⚠️ Stock ideas are indicative only. Verify current price and fundamentals before acting.</div>
        </div>`
      : '';

    return `<div class="sector-card ${s.conviction?.toLowerCase()||''}">
      <div class="sc-header">
        <div class="sc-name">${s.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">

          ${pill(s.signal||'BUY','p-green')}
        </div>
      </div>
      <p class="sc-row">${s.thesis||''}</p>
      <div class="sc-geo">
        <strong>Geo Scenario:</strong>
        Scenario A ${s.geo_scenario_a ? '✅' : '❌'} &nbsp;|&nbsp; Scenario B ${s.geo_scenario_b ? '✅' : '❌'}
      </div>
      <div class="sc-risk"><strong>Key Risk:</strong> ${s.risk||'—'}</div>

  }).join('');

  return `
  ${sectionTitle('sec-topsectors','🎯','Section 4 — Top Sectors for Investment')}
  <div class="chart-row cols-2">${cards}</div>`;
}

function buildQA() {
  const faqs = [
    {
      q: 'What is the Nifty 50 P/E ratio and why does it matter?',
      a: 'The Nifty 50 P/E (Price-to-Earnings) ratio measures how much investors are paying for every ₹1 of earnings generated by the index. A lower P/E (below 20x) historically means the market is cheap — investors have earned strong 1-year returns (30%+) when buying at these levels. A high P/E (above 26x) signals overvaluation, where future returns are historically muted. This report uses NSE\'s consolidated TTM P/E as the primary signal.'
    },
    {
      q: 'How should I use the Watchlist Trigger Levels?',
      a: 'Set price alerts on your brokerage app for the trigger levels shown in Section 1 (Market Pulse). When Nifty hits those levels, act on the suggested allocation. Don\'t wait for the "perfect" bottom — rupee-cost averaging via SIP at the suggested allocations has historically outperformed trying to time exact entries. The pullback levels (-10%, -20%, -30%) are pre-computed from the current Nifty level.'
    },
    {
      q: 'What is the difference between a Direct Plan and a Regular Plan mutual fund?',
      a: 'A Direct Plan is purchased directly from the AMC (Asset Management Company) without a distributor/advisor in the middle. This means 0.5–1.5% lower annual expense ratio. Over 10–20 years, this compounds significantly — a ₹10 lakh Direct Plan investment can end up 15–25% larger than the same Regular Plan investment, simply from lower fees. Always choose Direct Plans via platforms like Groww, Zerodha Coin, MF Central, or directly on the AMC website.'
    },
    {
      q: 'Why is headcount data a useful investment signal?',
      a: 'Companies hire in anticipation of revenue growth, not in response to it. When a company announces aggressive lateral hiring, it typically has visibility into a 12–18 month revenue pipeline. Mass layoffs driven by automation (not demand decline) are often bullish for margins. This makes headcount data a leading indicator — it moves before earnings do. The Headcount Intelligence section in Tab 4 categorises each event by type and maps it to specific investment implications.'
    },
    {
      q: 'How is the geopolitical risk section relevant to my Indian portfolio?',
      a: 'India imports 83% of its crude oil through the Strait of Hormuz, making it highly exposed to Middle East conflicts. Crude oil price spikes increase inflation, weaken the INR, compress OMC margins, and slow RBI rate cuts. However, they also benefit Defence (budget acceleration), Pharma (INR weakness boosts export revenue), Renewables (energy transition urgency), and Oil Exploration (ONGC). The Geo section maps each conflict scenario to specific sector actions.'
