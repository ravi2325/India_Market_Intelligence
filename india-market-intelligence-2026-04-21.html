// ── GLOSSARY ──────────────────────────────────────────────────────────────────
function buildGlossary() {
  const term = (t, abbr, def, ex) =>
    `<div class="glos-item">
      <div class="glos-term">${t}${abbr ? `<span class="glos-abbr">${abbr}</span>` : ''}</div>
      <div class="glos-def">${def}</div>
      ${ex ? `<div class="glos-ex">Example: ${ex}</div>` : ''}
    </div>`;

  const cat = (title, items) =>
    `<div class="glos-cat">
      <div class="glos-cat-title">${title}</div>
      ${items}
    </div>`;

  return `
  ${sectionTitle('sec-glossary','📖','Glossary & Methodology Reference')}
  <div class="card" style="margin-bottom:14px;">
    ${cat('📊 Valuation Terms', `
      ${term('P/E Ratio','Price-to-Earnings','Measures how much investors pay for every ₹1 of annual earnings. Calculated as: Nifty 50 index level ÷ aggregate EPS of Nifty 50 companies. A lower P/E means the market is cheaper; historically, buying at low P/E produces stronger returns.','Nifty at 23,800 with EPS of 1,127 → P/E = 21.1x')}
      ${term('Consolidated TTM P/E','','The NSE-standard P/E ratio using consolidated earnings (includes subsidiary profits) on a trailing twelve month (TTM) basis. This is the correct P/E to use for Nifty 50 — do not confuse with standalone or forward P/E.','NSE publishes this on nseindia.com under market statistics')}
      ${term('Sensex P/E','','BSE Sensex Price-to-Earnings ratio — used in this report as a cross-validation for the Nifty P/E. If both show the same zone, signal is confirmed. If they diverge, the more conservative reading is used.','Nifty: 21.1x, Sensex: 21.3x → Both in Fair Value zone → Signal confirmed')}
      ${term('Fair Value Zone','20–22x P/E','Historical Nifty P/E range where the market is considered fairly priced. Based on 9 years of data (Mar 2016–Mar 2025, ex-COVID). At this zone, 1-year returns averaged 30.8% with 100% positive probability.','At 21.1x P/E, every historical entry in this range has delivered positive returns within 1 year')}
      ${term('CAGR','Compound Annual Growth Rate','The annualised return of an investment over multiple years, accounting for compounding. A 3yr CAGR of 20% means ₹1 lakh grew to ~₹1.73 lakh over 3 years.','₹1L → ₹1.73L in 3 years = 20% CAGR')}
    `)}
    ${cat('💰 Investment Terms', `
      ${term('SIP','Systematic Investment Plan','A method of investing a fixed amount at regular intervals (monthly/quarterly). SIPs reduce timing risk through rupee-cost averaging — you buy more units when markets fall and fewer when they rise.','₹10,000/month in a Nifty 50 index fund for 10 years')}
      ${term('Lump Sum','','Investing a large amount at one time. More suitable when valuations are clearly cheap (P/E < 20x). In expensive zones, SIPs are preferred to reduce timing risk.','Deploying ₹5 lakh at once when Nifty P/E is 18x')}
      ${term('Direct Plan','','Mutual fund plan purchased directly from the AMC (not through a distributor). Has a lower expense ratio (0.5–1.5% less than Regular Plans). Over 10–20 years, this compounding gap is significant.','Nippon India Pharma Fund — Direct Growth vs Regular Growth: 0.98% vs 1.82% expense ratio')}
      ${term('NAV','Net Asset Value','Price of one unit of a mutual fund. Calculated daily: (Total assets − liabilities) ÷ Number of outstanding units.','If NAV is ₹450 and you invest ₹45,000, you get 100 units')}
      ${term('AUM','Assets Under Management','Total market value of all assets managed by a fund. Larger AUM generally means better liquidity but can also limit agility for smaller-cap strategies. This report flags funds below ₹200 Cr as liquidity risks.','Nippon India Gold BeES: ₹12,400 Cr AUM — highly liquid')}
      ${term('Expense Ratio','','Annual fee charged by a mutual fund as a % of AUM. Directly reduces your returns. Always choose Direct Plans to minimise this. ETFs typically have 0.1–0.3% vs 0.7–1.5% for active funds.','Mirae Defence ETF: 0.20% — on ₹1L, this is ₹200/year')}
      ${term('ETF','Exchange Traded Fund','A mutual fund that trades on a stock exchange like a share. Requires a demat account. Has the lowest expense ratios but you need to check daily trading volume to ensure liquidity.','Motilal Oswal Nifty IT ETF trades on NSE — buy/sell any time during market hours')}
    `)}
    ${cat('📈 Return Metrics', `
      ${term('YTD','Year-to-Date','Return from January 1st of the current year to today. Shows how a sector has performed in the current calendar year.','Nifty Defence YTD: +12.4% means it is up 12.4% since Jan 1, 2026')}
      ${term('1yr Return','','Price change over the last 12 months. This is the most commonly used return metric for sector comparison in this report.','')}
      ${term('Prev Year Return','','The full-year return for the prior financial year (FY25: Apr 2024 – Mar 2025) or calendar year. Shows whether current momentum is a continuation or reversal.','Nifty Defence Prev Year: +62.3% shows the strong prior-year run that current returns are building on')}
      ${term('3yr / 5yr CAGR','','Annualised return over 3 or 5 years. Smooths out short-term noise. Useful for assessing if a sector has structurally outperformed.','Defence 3yr CAGR of 62% signals sector re-rating, not just a trade')}
    `)}
    ${cat('🌍 Geo & Risk Terms', `
      ${term('Geo-Risk Overlay','','Each sector is tagged based on how geopolitical events (e.g. Hormuz crisis) affect it. Winner = sector benefits. Loser = sector hurt. Neutral = minimal direct impact.','')}
      ${term('Cascade Effect','','Secondary industries affected downstream when a commodity price changes. Example: crude oil rises → ATF (jet fuel) rises → airlines lose margin → hotel/travel demand falls.','Crude oil spike cascades to: Airlines → Paints → Plastics → Chemicals → Beverages')}
      ${term('Scenario A / B','','Two investment cases based on whether a geopolitical event resolves quickly (Scenario A) or persists (Scenario B). Each scenario has different sector implications shown in Section 0.','')}
      ${term('INR Weakness','','When the Indian Rupee depreciates against the USD. Bad for importers (oil, electronics, gold). Good for exporters (IT, Pharma, textiles) because they earn USD but pay costs in INR.','INR weakens from ₹85 to ₹93 → IT company earning $1M revenue now gets ₹93M instead of ₹85M — windfall')}
    `)}
    ${cat('👥 Headcount Intelligence', `
      ${term('Leading Indicator','','Headcount data moves BEFORE earnings because companies hire in anticipation of future revenue. A company announcing 3,000 AI-specialist hires today has visibility into 12–18 months of revenue pipeline.','HAL hiring 4,500 engineers → signals Tejas Mk2 production ramp is funded and progressing')}
      ${term('Hiring Intent Score','0–10','A composite signal (0=bearish, 10=strongly bullish) for each sector, based on the volume and type of hiring observed. Scores ≥7 are considered bullish leading indicators.','')}
      ${term('2yr Trend','Uptick/Decline/Stable','Whether the sector\'s hiring activity is increasing, decreasing, or flat compared to 2 years ago. An "Uptick" in hiring trend is a positive forward signal even before earnings confirm it.','')}
    `)}
    ${cat('📋 About This Report', `
      ${term('Methodology','JP Morgan P/E Framework','This report is built on JP Morgan\'s historical study of Nifty 50 returns stratified by P/E ratio at entry. The data covers 9 years (Mar 2016–Mar 2025) and excludes the COVID earnings-distortion period (Jun 2020–Jun 2021) when P/E was inflated by temporarily suppressed earnings — not genuine overvaluation.','')}
      ${term('Data Sources','','Each report run fetches live data via 6 targeted web searches. At minimum 2 sources are verified per key data point. P/E from NSE India + Trendlyne. Sector returns from Moneycontrol + Tickertape. Commodity prices from dedicated commodity price pages only — never sidebar widgets on unrelated pages.','Gold price must come from Bullionvault / Kitco — not a sidebar on a bond-yield page')}
      ${term('Source Transparency','','Every section includes source chips (grey badges). When a chip is not hyperlinked, it means the live skill run did not return a direct URL — the data is still valid but the URL was not captured. Run the India Market Intelligence skill to regenerate with live URLs.','')}
      ${term('Data Freshness','','This report shows when data was fetched (top of the Overview tab). If the fetch date is more than 1 day old, re-run the skill to get fresh numbers. Markets move daily.','')}
    `)}
  </div>
  ${buildTabNav(7)}`;
}

// ── CHART INITIALIZATION ──────────────────────────────────────────────────────
function initCharts() {
  const sectors = D.sectors || [];
  const sNames   = sectors.map(s => s.name);
  const sReturns = sectors.map(s => s.return_1yr || 0);
  const sColors  = sReturns.map(v => v >= 0 ? '#16a34a' : '#dc2626');

  const hc = D.headcount || {};
  const hiLabels = (hc.hiring_intent || []).map(h => h.sector);
  const hiScores = (hc.hiring_intent || []).map(h => h.score || 5);
  const hiColors = hiScores.map(s => s >= 7 ? '#16a34a' : s >= 5 ? '#f59e0b' : '#dc2626');
  const hcTrend  = sectors.map(s => s.headcount_trend_score || 5);

  // Chart 1: P/E zone returns (static historical)
  const c1 = document.getElementById('peZoneChart');
  if (c1) new Chart(c1, {
    type: 'bar',
    data: {
      labels: ['<18x','18-20x','20-22x','22-24x','24-26x','26-28x','>28x'],
      datasets: [{ label: 'Avg 1yr Return (%)', data: [40, 35, 30.8, 20.6, 11.7, 7.1, -2.9],
        backgroundColor: ['#16a34a','#16a34a','#16a34a','#2563eb','#f59e0b','#ea580c','#dc2626'] }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{y:{grid:{color:'#f1f5f9'},ticks:{callback:function(v){return v+'%';}}}} }
  });

  // Chart 2: Sector returns (horizontal bar)
  const c2 = document.getElementById('sectorReturnChart');
  if (c2) new Chart(c2, {
    type: 'bar',
    data: {
      labels: sNames,
      datasets: [{ label: '1yr Return (%)', data: sReturns, backgroundColor: sColors }]
    },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{x:{grid:{color:'#f1f5f9'},ticks:{callback:function(v){return v+'%';}}}} }
  });

  // Chart 3: Hiring intent bar
  const c3 = document.getElementById('hiringChart');
  if (c3) new Chart(c3, {
    type: 'bar',
    data: {
      labels: hiLabels,
      datasets: [{ label: 'Hiring Intent (0–10)', data: hiScores, backgroundColor: hiColors }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{y:{min:0,max:10,grid:{color:'#f1f5f9'}}} }
  });

  // Chart 4: Headcount trend line
  const c4 = document.getElementById('headcountTrendChart');
  if (c4) new Chart(c4, {
    type: 'line',
    data: {
      labels: sNames,
      datasets: [{ label: 'Headcount Momentum', data: hcTrend,
        borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,0.08)', fill:true, tension:0.4,
        pointBackgroundColor: hcTrend.map(function(v){ return v >= 7 ? '#16a34a' : v >= 5 ? '#f59e0b' : '#dc2626'; }),
        pointRadius: 5 }]
    },
    options: { responsive:true, maintainAspectRatio:false,
      scales:{y:{min:0,max:10,grid:{color:'#f1f5f9'}}} }
  });
}

    { date:'Apr 15', cat:'data', label:'Data', text:'Sector returns corrected: Bank 7.49%, Pharma 7.28%, Auto 3yr 105%, Metal 3yr 119.75% — all from Tickertape live fetch.' },
    // ── GOVERNANCE ──
    { date:'Apr 14', cat:'governance', label:'Governance', text:'isValidUrl() function in template: rejects fabricated/placeholder URLs from rendering as hyperlinks.' },
    { date:'Apr 14', cat:'governance', label:'Governance', text:'Source URL policy: every numerical field requires a source_url. Null renders as unlinked chip — acceptable. Guessed URL is not.' },
    { date:'Apr 15', cat:'governance', label:'Governance', text:'Rule 0 — Zero Estimates, Zero Dummy Values: the most important rule. Null > wrong number. Added to SKILL.md.' },
    { date:'Apr 15', cat:'governance', label:'Governance', text:'Rule 5 — Tickertape as single consistent source for all sector returns (same methodology/basis across all sectors).' },
    { date:'Apr 15', cat:'governance', label:'Governance', text:'Rule 6 — Fund return data requires dedicated Groww/Paytmmoney page search per run. Never carry forward.' },
    { date:'Apr 15', cat:'governance', label:'Governance', text:'Rule 7 — FII/DII period must be explicit (e.g. "Apr 7–13" not "MTD"). Retail flows null if not found.' },
    { date:'Apr 15', cat:'governance', label:'Governance', text:'SKILL.md synced to both locations: Documents folder AND skills plugin — diff verified identical.' },
    // ── SECURITY ──
    { date:'Apr 13', cat:'security', label:'Security', text:'PDF PIN gate: printReport() function prompts for PIN before window.print(). PIN: 2325.' },

    { date:'Apr 15', cat:'security', label:'Security', text:'Tab 8 (this tab) PIN-protected: improvements log is personal/internal. PIN: 2325. Uses sessionStorage to avoid repeat entry.' },
  ];

  const cats = {
    architecture:{ label:'🏗️ Architecture', color:'#7c3aed' },
    design:      { label:'🎨 Design & UX',  color:'#0891b2' },
    data:        { label:'📊 Data Quality', color:'#16a34a' },
    governance:  { label:'📋 Governance',   color:'#f0a500' },
    security:    { label:'🔒 Security',     color:'#dc2626' }
  };

  const counts = {};
  improvements.forEach(i => { counts[i.cat] = (counts[i.cat]||0)+1; });

  const byCategory = {};
  improvements.forEach(i => {
    if (!byCategory[i.cat]) byCategory[i.cat] = [];
    byCategory[i.cat].push(i);
  });

  const statsHtml = `<div class="impr-stat-grid">
    <div class="impr-stat"><div class="impr-stat-val">${improvements.length}</div><div class="impr-stat-lbl">Total Improvements</div></div>
    <div class="impr-stat"><div class="impr-stat-val">${Object.keys(cats).length}</div><div class="impr-stat-lbl">Categories</div></div>
    <div class="impr-stat"><div class="impr-stat-val">Apr 13–15</div><div class="impr-stat-lbl">Sprint Period</div></div>
    <div class="impr-stat"><div class="impr-stat-val">v2.0</div><div class="impr-stat-lbl">Report Version</div></div>
  </div>`;

  const catHtml = Object.entries(byCategory).map(([cat, items]) => {
    const info = cats[cat];
    return `<div class="impr-category">
      <h4 style="color:${info.color}">${info.label} <span style="font-size:10px;font-weight:400;color:var(--muted)">(${items.length} improvements)</span></h4>
      ${items.map(i => `<div class="impr-item">
        <span class="impr-date">${i.date}</span>
        <span class="impr-badge ${cat}">${i.label}</span>
        <span style="flex:1">${i.text}</span>
      </div>`).join('')}
    </div>`;
  }).join('');

  return `<div class="wrap">
    <div id="impr-pin-gate" class="impr-pin-gate">
      <div style="font-size:32px;margin-bottom:8px;">🔒</div>
      <h3>Improvements Log</h3>
      <p>This tab is for personal use only. Enter PIN to view the full improvements tracker.</p>
      <input type="password" class="impr-pin-input" id="impr-pin" maxlength="4" placeholder="••••" onkeyup="if(event.key==='Enter')checkImprPin()">
      <br>
      <button class="impr-pin-btn" onclick="checkImprPin()">Unlock Log</button>
      <div class="impr-pin-error" id="impr-pin-error">Incorrect PIN. Try again.</div>
    </div>
    <div id="impr-content" class="impr-content">
      <div class="section-title">📋 Report Improvements Log — Sprint Apr 13–15, 2026</div>
      ${statsHtml}
      ${catHtml}
    </div>
  </div>`;
}

function checkImprPin() {
  const pin = document.getElementById('impr-pin')?.value;
  if (pin === '2325') {

    sessionStorage.setItem('impr_unlocked','1');
  } else {
    const err = document.getElementById('impr-pin-error');
    if (err) { err.style.display='block'; setTimeout(()=>err.style.display='none',2500); }
  }
}
